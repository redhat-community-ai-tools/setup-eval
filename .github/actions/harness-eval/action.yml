name: "harness-eval"
description: "Lint and security-scan AI agent setups (CLAUDE.md, skills, commands, hooks, MCP configs, agents). 68 deterministic rules, no LLM required."
author: "redhat-community-ai-tools"

branding:
  icon: "shield"
  color: "blue"

inputs:
  path:
    description: "Directories to scan, one per line. Default scans the repo root."
    default: "."
  preset:
    description: "Rule preset: recommended, strict, security, or pre-workflow"
    default: "recommended"
  security-gate:
    description: "Run security scan (--fail-on-warning). Set to 'false' to skip."
    default: "true"
  lint-gate:
    description: "Run lint scan (--fail-on-error). Set to 'false' to skip."
    default: "true"
  lint-fail-on:
    description: "Lint failure threshold: 'error' (default) or 'warning' (strict)"
    default: "error"
  sarif:
    description: "Upload SARIF to GitHub Code Scanning for inline PR annotations"
    default: "true"
  comment:
    description: "Post a summary comment on pull requests"
    default: "true"
  recursive:
    description: "Recursively search for agent configs in all subdirectories"
    default: "false"
  version:
    description: "harness-eval version to install (e.g. '5.0.0'). Leave empty for latest."
    default: ""

outputs:
  security-passed:
    description: "Whether the security gate passed"
    value: ${{ steps.security.outcome == 'success' || inputs.security-gate != 'true' }}
  lint-passed:
    description: "Whether the lint gate passed"
    value: ${{ steps.lint.outcome == 'success' || inputs.lint-gate != 'true' }}
  sarif-file:
    description: "Path to the SARIF output directory (if generated)"
    value: ${{ steps.sarif.outputs.sarif-dir }}

runs:
  using: "composite"
  steps:
    - name: Install harness-eval
      shell: bash
      run: |
        if [ -n "${{ inputs.version }}" ]; then
          pip install -q "harness-eval==${{ inputs.version }}"
        else
          pip install -q harness-eval
        fi
        echo "Installed: $(harness-eval --version)"

    - name: Security gate
      id: security
      if: inputs.security-gate == 'true'
      shell: bash
      run: |
        echo "=== Security Scan ==="
        recursive_flag=""
        if [ "${{ inputs.recursive }}" = "true" ]; then
          recursive_flag="--recursive"
        fi
        failed=0
        while IFS= read -r dir; do
          dir=$(echo "$dir" | xargs)
          [ -z "$dir" ] && continue
          harness-eval security "$dir" $recursive_flag || true
          if ! harness-eval security "$dir" $recursive_flag --fail-on-warning > /dev/null 2>&1; then
            failed=1
          fi
        done <<< "${{ inputs.path }}"
        exit $failed

    - name: Lint gate
      id: lint
      if: inputs.lint-gate == 'true' && always()
      shell: bash
      run: |
        echo "=== Lint Scan ==="
        fail_flag="--fail-on-error"
        if [ "${{ inputs.lint-fail-on }}" = "warning" ]; then
          fail_flag="--fail-on-warning"
        fi
        recursive_flag=""
        if [ "${{ inputs.recursive }}" = "true" ]; then
          recursive_flag="--recursive"
        fi
        failed=0
        json_dir="${{ runner.temp }}/harness-eval-json"
        mkdir -p "$json_dir"
        i=0
        while IFS= read -r dir; do
          dir=$(echo "$dir" | xargs)
          [ -z "$dir" ] && continue
          harness-eval lint "$dir" --preset "${{ inputs.preset }}" $recursive_flag || true
          harness-eval lint "$dir" --preset "${{ inputs.preset }}" $recursive_flag --format json > "$json_dir/lint-$i.json" 2>/dev/null || true
          if ! harness-eval lint "$dir" --preset "${{ inputs.preset }}" $recursive_flag $fail_flag > /dev/null 2>&1; then
            failed=1
          fi
          i=$((i + 1))
        done <<< "${{ inputs.path }}"
        echo "json-dir=$json_dir" >> "$GITHUB_OUTPUT"
        exit $failed

    - name: Generate SARIF
      id: sarif
      if: inputs.sarif == 'true' && always()
      shell: bash
      run: |
        sarif_dir="${{ runner.temp }}/harness-eval-sarif"
        mkdir -p "$sarif_dir"
        recursive_flag=""
        if [ "${{ inputs.recursive }}" = "true" ]; then
          recursive_flag="--recursive"
        fi
        total_results=0
        i=0
        while IFS= read -r dir; do
          dir=$(echo "$dir" | xargs)
          [ -z "$dir" ] && continue
          harness-eval lint "$dir" --preset "${{ inputs.preset }}" $recursive_flag --format sarif --output "$sarif_dir/results-$i.sarif" || true
          count=$(python3 -c "import json; d=json.load(open('$sarif_dir/results-$i.sarif')); print(len(d['runs'][0]['results']))" 2>/dev/null || echo "0")
          total_results=$((total_results + count))
          i=$((i + 1))
        done <<< "${{ inputs.path }}"
        echo "sarif-dir=$sarif_dir" >> "$GITHUB_OUTPUT"
        echo "total-results=$total_results" >> "$GITHUB_OUTPUT"

    - name: Upload SARIF
      if: inputs.sarif == 'true' && always() && steps.sarif.outputs.sarif-dir != ''
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ steps.sarif.outputs.sarif-dir }}
        category: harness-eval

    - name: Build PR comment
      id: comment-body
      if: inputs.comment == 'true' && always() && github.event_name == 'pull_request'
      shell: bash
      run: |
        json_dir="${{ steps.lint.outputs.json-dir }}"
        sarif_results="${{ steps.sarif.outputs.total-results }}"
        ver=$(harness-eval --version 2>&1 | grep -oP '[\d.]+' || echo "unknown")

        # Build component and category tables from JSON
        details=$(python3 << 'PYEOF'
        import json, glob, os, sys

        json_dir = os.environ.get("JSON_DIR", "")
        files = sorted(glob.glob(f"{json_dir}/lint-*.json")) if json_dir else []

        components = []
        categories = {}
        total_errors = 0
        total_warnings = 0

        for f in files:
            try:
                d = json.load(open(f))
            except Exception:
                continue
            inspection = d.get("inspection", {})
            summary = inspection.get("summary", {})
            total_errors += summary.get("errors", 0)
            total_warnings += summary.get("warnings", 0)

            for type_key in inspection:
                if type_key == "summary":
                    continue
                for comp in inspection[type_key]:
                    name = comp.get("name", "unknown")
                    rules_checked = len(comp.get("rules", []))
                    findings = comp.get("errors", 0) + comp.get("warnings", 0)
                    status = "✓" if findings == 0 else f"✗ {findings}"
                    components.append((name, type_key, rules_checked, status))
                    for rule in comp.get("rules", []):
                        cat = rule["rule"].split("/")[0]
                        if cat not in categories:
                            categories[cat] = {"checked": 0, "passed": 0}
                        categories[cat]["checked"] += 1
                        if rule.get("result") == "pass":
                            categories[cat]["passed"] += 1

        lines = []
        lines.append(f"total_errors={total_errors}")
        lines.append(f"total_warnings={total_warnings}")

        if components:
            lines.append("COMP_TABLE_START")
            for name, ctype, rules, status in components:
                lines.append(f"| {name} | {ctype} | {rules} | {status} |")
            lines.append("COMP_TABLE_END")

        if categories:
            lines.append("CAT_TABLE_START")
            for cat in sorted(categories):
                c = categories[cat]
                result = "✓ clean" if c["checked"] == c["passed"] else f"✗ {c['checked'] - c['passed']} issues"
                lines.append(f"| {cat} | {c['checked']} | {result} |")
            lines.append("CAT_TABLE_END")

        print("\n".join(lines))
        PYEOF
        )

        total_errors=$(echo "$details" | grep "^total_errors=" | cut -d= -f2)
        total_warnings=$(echo "$details" | grep "^total_warnings=" | cut -d= -f2)

        sec_icon="✓"; sec_msg="passed (15 security rules)"
        [ "${{ inputs.security-gate }}" != "true" ] && { sec_icon="○"; sec_msg="skipped"; }
        [ "${{ steps.security.outcome }}" != "success" ] && [ "${{ inputs.security-gate }}" = "true" ] && { sec_icon="✗"; sec_msg="findings detected"; }

        warnings_note=""
        [ "${total_warnings:-0}" -gt 0 ] && warnings_note=", ${total_warnings} warnings (non-blocking)"
        lint_icon="✓"; lint_msg="passed (68 rules, ${total_errors:-0} errors${warnings_note})"
        [ "${{ inputs.lint-gate }}" != "true" ] && { lint_icon="○"; lint_msg="skipped"; }
        [ "${{ steps.lint.outcome }}" != "success" ] && [ "${{ inputs.lint-gate }}" = "true" ] && { lint_icon="✗"; lint_msg="${total_errors:-0} errors${warnings_note}"; }

        sarif_icon="✓"; sarif_msg="uploaded (${sarif_results:-0} findings)"
        [ "${{ inputs.sarif }}" != "true" ] && { sarif_icon="○"; sarif_msg="skipped"; }
        [ "${{ steps.sarif.outcome }}" != "success" ] && [ "${{ inputs.sarif }}" = "true" ] && { sarif_icon="✗"; sarif_msg="failed"; }

        # Build component table
        comp_table=""
        if echo "$details" | grep -q "COMP_TABLE_START"; then
            comp_rows=$(echo "$details" | sed -n '/COMP_TABLE_START/,/COMP_TABLE_END/p' | grep "^|")
            comp_count=$(echo "$comp_rows" | wc -l)
            comp_header="| Component | Type | Rules checked | Result |
        |---|---|---|---|"
            if [ "$comp_count" -le 8 ]; then
                comp_table="
        ### Scanned components

        ${comp_header}
        ${comp_rows}"
            else
                comp_table="
        <details><summary>Scanned components (${comp_count})</summary>

        ${comp_header}
        ${comp_rows}

        </details>"
            fi
        fi

        # Build category table
        cat_table=""
        if echo "$details" | grep -q "CAT_TABLE_START"; then
            cat_rows=$(echo "$details" | sed -n '/CAT_TABLE_START/,/CAT_TABLE_END/p' | grep "^|")
            cat_table="
        ### Rules by category

        | Category | Rules checked | Result |
        |---|---|---|
        ${cat_rows}"
        fi

        # Assemble final body
        body="## Harness Eval Results

        ${sec_icon} **Security checks**: ${sec_msg}
        ${lint_icon} **Lint checks**: ${lint_msg}
        ${sarif_icon} **Code scanning**: ${sarif_msg}
        ${comp_table}
        ${cat_table}

        ---
        *[harness-eval](https://github.com/redhat-community-ai-tools/harness-eval) v${ver} | 68 rules | preset: ${{ inputs.preset }}*"

        body=$(echo "$body" | sed 's/^        //')

        # Save to file to avoid quoting issues
        echo "$body" > "${{ runner.temp }}/harness-eval-comment.md"

      env:
        JSON_DIR: ${{ steps.lint.outputs.json-dir }}

    - name: Post PR comment
      if: inputs.comment == 'true' && always() && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        pr_number="${{ github.event.pull_request.number }}"

        existing=$(gh api "repos/${{ github.repository }}/issues/${pr_number}/comments" \
          --jq '.[] | select(.body | contains("Harness Eval Results")) | .id' 2>/dev/null || true)
        for cid in $existing; do
          gh api -X DELETE "repos/${{ github.repository }}/issues/comments/$cid" 2>/dev/null || true
        done

        gh pr comment "$pr_number" --body-file "${{ runner.temp }}/harness-eval-comment.md"
