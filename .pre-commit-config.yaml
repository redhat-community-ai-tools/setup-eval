repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/PyCQA/bandit
    rev: "1.8.3"
    hooks:
      - id: bandit
        args: ["-r", "src/"]

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run pytest tests/ -q
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: security-gate
        name: security gate
        entry: uv run harness-eval security . --fail-on-warning
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: lint-gate
        name: lint gate
        entry: uv run harness-eval lint . --fail-on-error
        language: system
        pass_filenames: false
        stages: [pre-push]
